{% extends "layout.html" %}
{% block content %}
<div class="az-page">
  <section class="az-panel">
    <div class="az-panel-header">
      <div>
        <h2 class="az-panel-title">Logs</h2>
        <div class="az-panel-meta">Recent scheduler and task log records captured by the dashboard log handler.</div>
      </div>
      <div class="az-chip-row">
        <span class="az-badge az-badge--neutral">Auto-refresh 10s</span>
      </div>
    </div>

    <form id="log-filters" class="az-filter-bar"
          hx-get="partials/table" hx-target="#logs-table" hx-swap="innerHTML"
          hx-trigger="change, submit from:#log-filters">
      <label class="az-field" style="min-width: min(22rem, 100%); flex: 1 1 16rem">
        <span>Task ID</span>
        <input name="task_id" placeholder="task id" class="az-input" />
      </label>
      <label class="az-field">
        <span>Level</span>
        <select name="level" class="az-select">
          <option value="">Any level</option>
          <option>DEBUG</option>
          <option>INFO</option>
          <option>WARNING</option>
          <option>ERROR</option>
          <option>CRITICAL</option>
        </select>
      </label>
      <label class="az-field" style="min-width: min(22rem, 100%); flex: 1 1 16rem">
        <span>Search</span>
        <input name="q" placeholder="message text" class="az-input" />
      </label>
      <label class="az-field">
        <span>Limit</span>
        <input name="limit" value="200" class="az-input" style="width: 7rem" />
      </label>
      <button class="az-button az-button--primary">Filter</button>
    </form>

    <div id="logs-table"
         hx-get="partials/table"
         hx-trigger="load once, every 10s"
         hx-swap="innerHTML"
         class="az-table-wrap">
      {% include "logs/partials/table.html" %}
    </div>
  </section>
</div>
{% endblock %}
