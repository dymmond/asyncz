<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="icon" href="{{ favicon|default(url_for('dashboard:statics', path='favicon.ico')) }}"/>
    <title>Page Not Found - 404</title>
    <link rel="stylesheet" href="{{ url_for('dashboard:statics', path='css/tailwind-4.3.2.min.css') }}">
    <link rel="stylesheet" href="{{ url_for('dashboard:statics', path='css/asyncz.css') }}">
</head>
<body class="bg-gray-100 min-h-screen flex items-center justify-center">
    <div class="text-center">
        <h1 class="text-9xl font-bold text-gray-700">404</h1>
        <p class="text-2xl md:text-3xl font-light leading-normal mb-8">
            Sorry, we couldn't find the page you're looking for.
        </p>
        <p class="text-gray-600 mb-8">
            The page you requested might have been moved or doesn't exist.
        </p>
        <a href="{{ url_for('dashboard:index') }}" class="text-blue-500 hover:underline text-lg">
            Go back to the homepage
        </a>
    </div>
</body>
</html>
